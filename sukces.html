<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Płatność potwierdzona — BezStrachu.pl</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; }
  .box { max-width: 500px; margin: 0 auto; padding: 40px; border: 1px solid #eee; border-radius: 8px; }
  h1 { color: #1a5f1a; }
  .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0a0a0a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <h1>✅ Płatność potwierdzona</h1>
  <p>Uruchamiamy Statystyczną Maszynę Restytucji...</p>
  <div class="loader"></div>
  <p style="color:#888; font-size:14px;">Za chwilę zobaczysz analizę Twojej sprawy.</p>
</div>
<script>
  // Redirect back to main page with session_id — main page picks it up and runs analysis
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  if (sessionId) {
    setTimeout(() => {
      window.location.href = '/?session_id=' + sessionId + '#result';
    }, 1500);
  } else {
    window.location.href = '/';
  }
</script>
</body>
</html>
